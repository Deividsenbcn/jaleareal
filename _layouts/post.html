---
layout: default
---

<article class="post-container">
    <header class="post-header">
        {% if page.thumbnail %}
        <img src="{{ page.thumbnail }}" alt="{{ page.title }}" class="post-thumbnail">
        {% endif %}
        <div class="post-meta">
            {% if page.categories %}
            <span class="post-category">{{ page.categories | first }}</span>
            {% endif %}
            <span class="post-date">{{ page.date | date: "%d %B %Y" }}</span>
        </div>
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="post-description">{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <footer class="post-footer">
        <a href="/" class="btn btn-outline">← Volver al inicio</a>
    </footer>
</article>
